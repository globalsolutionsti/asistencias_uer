<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IEDEP | Asistencia Manual</title>

<link rel="stylesheet" href="css/asistencia_manual.css">

</head>

<body>

<div class="container">

    <div class="card">

        <div class="header">

            <img
                src="img/logo.png"
                alt="IEDEP"
                class="logo-ieped">

            <h2>Asistencia Manual RH</h2>

            <p class="subtitulo">
                Registro Extraordinario de Asistencias
            </p>

        </div>

        <label>Colaborador</label>

        <select id="empleado"></select>

        <label>Fecha de Asistencia</label>

        <input
            type="date"
            id="fecha">

        <label>Hora de Asistencia</label>

        <input
            type="time"
            id="hora">

        <label>Tipo</label>

        <select id="tipo">

            <option value="ENTRADA">
                Entrada
            </option>

            <option value="SALIDA">
                Salida
            </option>

        </select>

        <label>Motivo</label>

        <select id="motivo">

            <option>
                Sin cobertura celular
            </option>

            <option>
                Sin internet
            </option>

            <option>
                Falla del sistema
            </option>

            <option>
                Comisión oficial
            </option>

            <option>
                Otro
            </option>

        </select>

        <label>Evidencia Fotográfica</label>

        <input
            type="file"
            id="evidencia"
            accept="image/*">

        <img
            id="preview"
            class="preview hidden">

        <button onclick="guardarAsistencia()">
            Guardar Asistencia
        </button>

        <div id="loading"
             class="loading hidden">

            <div class="spinner"></div>

            <p>Guardando información...</p>

        </div>

    </div>

    <div class="footer-ieped">

        Gobierno del Estado de Puebla · IEDEP

    </div>

</div>

<script src="js/asistencia_manual.js"></script>

</body>

</html>
