<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IEDEP | Puntualidad</title>

<link rel="stylesheet" href="../css/puntualidad.css">
</head>

<body>

<div class="container">

    <div class="card">
     <div class="top-bar"></div>
        <div class="header">
            <img src="../img/logo.png" class="logo-ieped">

  <div class="contenedor-regresar">

        <button
        class="btn-dashboard"
        onclick="window.location.href='../portal-rh/dashboard.html'">

            🏠 Dashboard

        </button>

    </div>
            
            <h2>Puntualidad RH</h2>
            <p class="subtitulo">Retardos menores y mayores</p>
        </div>

        <div class="filtros">

            <input type="date" id="fechaInicio">
            <input type="date" id="fechaFin">

            <button onclick="consultarRetardos()">
                Consultar
            </button>

            <button onclick="exportarExcel()">
                Exportar Excel
            </button>

        </div>

        <div class="resumen">

            <div class="resumen-card">
                <h3 id="totalMenores">0</h3>
                <p>Retardos Menores</p>
            </div>

            <div class="resumen-card">
                <h3 id="totalMayores">0</h3>
                <p>Retardos Mayores</p>
            </div>

        </div>

        <div id="resultado"></div>

    </div>

</div>

<div id="spinnerOverlay" class="spinner-overlay hidden">
    <div class="spinner-card">
        <div class="spinner"></div>
        <p id="spinnerTexto">Consultando puntualidad...</p>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-card">
        <div class="modal-header"></div>
        <div class="modal-content">
            <h3 id="modalTitulo">Puntualidad</h3>
            <p id="modalMensaje"></p>
            <button onclick="cerrarModal()">Aceptar</button>
        </div>
    </div>
</div>

<script src="../js/config.js"></script>
<script src="../js/puntualidad.js"></script>

</body>
</html>
