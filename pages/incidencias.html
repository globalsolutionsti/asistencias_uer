<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>Incidencias RH</title>

<link rel="stylesheet"
href="../css/incidencias.css">

</head>

<body>

<div class="container">

    <div class="card">

        <h2>
            Incidencias RH
        </h2>

        <div class="filtros">

            <input
            type="date"
            id="fechaInicio">

            <input
            type="date"
            id="fechaFin">

            <button
            onclick="consultarIncidencias()">

                Consultar

            </button>

        </div>

        <div id="resultado">

        </div>

    </div>

</div>

<div id="spinnerOverlay" class="spinner-overlay hidden">
    <div class="spinner-card">
        <div class="spinner"></div>
        <p>Generando incidencias...</p>
    </div>
</div>

<div id="modalOverlay" class="modal-overlay hidden">
    <div class="modal-card">
        <div class="modal-header"></div>
        <div class="modal-content">
            <h3 id="modalTitulo">Incidencias</h3>
            <p id="modalMensaje"></p>
            <button onclick="cerrarModal()">Aceptar</button>
        </div>
    </div>
</div>
      
<script src="../js/incidencias.js"></script>

</body>

</html>
